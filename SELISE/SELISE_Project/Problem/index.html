<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trainee Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 id="count">0 trainees present</h2>
    
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter trainee name">
      <button id="addBtn">Add</button>
    </div>
    
    <table id="traineeTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
