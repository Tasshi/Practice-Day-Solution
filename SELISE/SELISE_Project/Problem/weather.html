<!DOCTYPE html>
<html>
  <body>
    <h1> The Weather of Gelephu</h1>
    <h3 id="temp">Loading…</h3>
    <script>
      async function getWeather() {
        try {
          const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=27.5&longitude=90.5&current_weather=true");
          const data = await response.json();
          const temp = data.current_weather.temperature;
          document.getElementById("temp").textContent = `Temperature: ${temp}°C`;
        } catch (error) {
          document.getElementById("temp").textContent = "Error loading weather";
          console.error(error);
        }
      }
      getWeather();
    </script>
  </body>
</html>
